<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>Carnet Rose — Suivi des mérites et progrès des élèves</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Carnet Rose : application de suivi des mérites, croix et progrès de vos élèves. Gérez vos classes simplement, en ligne comme hors ligne."
    />
    <meta
      name="keywords"
      content="carnet rose, suivi élèves, mérites, croix, classe, enseignant, gestion de classe, carnet de notes"
    />
    <meta name="author" content="Carnet Rose" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://gryzax.github.io/carnet-rose/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Carnet Rose" />
    <meta property="og:title" content="Carnet Rose — Suivi des mérites et progrès des élèves" />
    <meta
      property="og:description"
      content="Application de suivi des mérites, croix et progrès de vos élèves. Gérez vos classes simplement, en ligne comme hors ligne."
    />
    <meta property="og:url" content="https://gryzax.github.io/carnet-rose/" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:image" content="https://gryzax.github.io/carnet-rose/icon.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Carnet Rose — Suivi des mérites et progrès des élèves" />
    <meta
      name="twitter:description"
      content="Application de suivi des mérites, croix et progrès de vos élèves. Gérez vos classes simplement, en ligne comme hors ligne."
    />
    <meta name="twitter:image" content="https://gryzax.github.io/carnet-rose/icon.svg" />

    <!-- PWA / mobile -->
    <meta name="theme-color" content="#DB2777" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carnet Rose" />
    <link rel="manifest" href="/carnet-rose/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/carnet-rose/icon.svg" />
    <link rel="apple-touch-icon" href="/carnet-rose/icon.svg" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* First-paint splash — gives Lighthouse meaningful content immediately
         instead of a blank screen while the JS bundle and fonts load. It lives
         inside #root, so React Native Web wipes it on mount automatically. */
      #splash {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f9e8e0;
      }
      #splash > div {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 4px solid rgba(231, 147, 96, 0.25);
        border-top-color: #e79360;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      Vous devez activer JavaScript pour utiliser Carnet Rose, l'application de suivi des mérites et
      progrès de vos élèves.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root">
      <div id="splash"><div></div></div>
    </div>

    <script>
      // Register the service worker from the static HTML so the app shell is
      // cached on the very first visit, without waiting for the React bundle.
      // App.tsx no longer does this.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
